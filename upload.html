<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Upload File</title>

<style>
body{
font-family:Arial;
background:#f2f2f2;
}

.box{
max-width:500px;
margin:40px auto;
background:#fff;
padding:20px;
border-radius:10px;
box-shadow:0 0 10px #ccc;
}

input,select{
width:100%;
padding:12px;
margin:10px 0;
}

button{
width:100%;
padding:15px;
background:#0d6efd;
color:white;
border:none;
font-size:18px;
border-radius:8px;
}
</style>

</head>
<body>

<div class="box">

<h2>Upload Your File</h2>

<input type="file">

<select>
<option>Black & White ₹5</option>
<option>Color ₹10</option>
</select>

<input type="number" placeholder="Number of Copies">

<button>Continue to Payment</button>

</div>

</body>
</html>
